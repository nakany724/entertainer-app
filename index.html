<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>エンターテイナー製作委員会アプリ2</title>
<style>
  body{font-family:-apple-system,"Hiragino Kaku Gothic ProN",sans-serif;margin:0;background:#f4f6f5;color:#1f2933}
  .wrap{max-width:520px;margin:0 auto;padding:16px}
  h1{font-size:18px;margin:8px 0 16px}
  h2{font-size:15px;margin:16px 0 8px}
  p.lead{font-size:13px;color:#667;margin:0 0 12px}
  label{display:block;font-size:13px;font-weight:600;margin:14px 0 4px}
  .req{color:#d64545;font-size:11px;margin-left:4px}
  input,textarea,select{box-sizing:border-box;padding:10px;border:1px solid #cbd2d9;border-radius:8px;font-size:15px;background:#fff}
  input[type=text],input[type=number],input[type=date],textarea{width:100%}
  textarea{min-height:70px}
  #req_text{min-height:160px}
  .dt{display:flex;align-items:center;gap:6px}
  .dt input[type=date]{flex:1}
  .dt select{padding:10px 6px}
  .chips label{display:inline-flex;align-items:center;font-weight:400;margin:4px 8px 4px 0;background:#fff;border:1px solid #cbd2d9;border-radius:999px;padding:6px 12px}
  .chips input{width:auto;margin-right:6px;padding:0}
  #exp_preview{margin-top:8px;max-width:100%;border-radius:8px;display:none}
  button{width:100%;margin-top:22px;padding:14px;border:none;border-radius:10px;background:#06C755;color:#fff;font-size:16px;font-weight:600}
  button:disabled{background:#9bd6b3}
  .msg{margin-top:14px;text-align:center;font-size:14px}
  .page{display:none}
  .loading{max-width:520px;margin:0 auto;padding:40px 16px;text-align:center;color:#889}
  /* カレンダー */
  .cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .cal-head .mlabel{font-size:16px;font-weight:600}
  .cal-head button{width:auto;margin:0;padding:6px 14px;background:#fff;color:#1f2933;border:1px solid #cbd2d9;font-size:16px;border-radius:8px}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
  .cal-grid .wd{text-align:center;font-size:11px;color:#889;padding:2px 0}
  .cell{min-height:46px;background:#fff;border:1px solid #eaeef0;border-radius:6px;padding:3px;font-size:12px;cursor:pointer;position:relative}
  .cell.blank{background:transparent;border:none;cursor:default}
  .cell.today{border-color:#06C755;border-width:2px}
  .cell.sel{background:#e7f5ee;border-color:#06C755}
  .cell .dot{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:6px;height:6px;border-radius:50%;background:#06C755}
  .cell .cnt{position:absolute;bottom:2px;right:4px;font-size:10px;color:#06C755;font-weight:600}
  .card{background:#fff;border:1px solid #e1e6ea;border-radius:10px;padding:12px;margin-bottom:12px}
  .card .t{font-weight:600;font-size:15px}
  .card .meta{font-size:12px;color:#667;margin-top:4px;line-height:1.5}
  .rowbtns{display:flex;gap:8px;margin-top:10px}
  .rowbtns button{flex:1;margin-top:0;padding:9px;font-size:14px;border-radius:8px;border:1px solid #cbd2d9;background:#fff;color:#1f2933;font-weight:400}
  .rowbtns .del{color:#d64545;border-color:#f0b3b3}
  .edit{margin-top:10px;padding-top:10px;border-top:1px dashed #dde;display:none}
  .edit .save{background:#06C755;color:#fff;border:none;font-weight:600}
  .empty{text-align:center;color:#667;font-size:14px;padding:16px 0}
  /* くじ */
  .lot-overlay{position:fixed;inset:0;background:rgba(15,23,25,.92);display:none;align-items:center;justify-content:center;flex-direction:column;z-index:50}
  .lot-overlay.on{display:flex}
  .spinner{width:90px;height:90px;border-radius:50%;border:8px solid rgba(255,255,255,.2);border-top-color:#06C755;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .lot-overlay .txt{color:#fff;font-size:18px;margin-top:22px;letter-spacing:2px;animation:pulse 1.2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
  .result{text-align:center;padding:24px 8px}
  .result .big{font-size:26px;font-weight:700;margin:8px 0}
  .result .win{color:#06C755}
  .result .lose{color:#889}
  .result .box{background:#fff;border:1px solid #e1e6ea;border-radius:12px;padding:18px;margin-top:12px}
  .result .tk{font-size:22px;font-weight:700;letter-spacing:2px;margin-top:6px}
  /* リッチ当たり画面 */
  #confetti{position:fixed;inset:0;pointer-events:none;z-index:60;display:none}
  .win-wrap{text-align:center;padding:10px 6px}
  .win-badge{font-size:15px;color:#c98a00;font-weight:700;letter-spacing:3px;animation:drop .5s ease}
  .win-title{font-size:40px;font-weight:800;margin:6px 0 4px;background:linear-gradient(90deg,#ff8a00,#ff3d77,#8a2be2);-webkit-background-clip:text;background-clip:text;color:transparent;animation:pop .6s cubic-bezier(.2,1.4,.4,1)}
  .prize-card{margin:16px auto 0;max-width:340px;border-radius:18px;padding:24px 18px;color:#fff;position:relative;overflow:hidden;
    background:linear-gradient(135deg,#7b2ff7,#f107a3);box-shadow:0 12px 30px rgba(241,7,163,.35);animation:pop .7s .1s both}
  .prize-card .plabel{font-size:12px;opacity:.85;letter-spacing:2px}
  .prize-card .pname{font-size:26px;font-weight:800;margin-top:6px;line-height:1.3}
  .prize-card .shine{position:absolute;top:-60%;left:-30%;width:60%;height:220%;background:rgba(255,255,255,.25);transform:rotate(25deg);animation:shine 2.2s ease-in-out infinite}
  @keyframes shine{0%{left:-40%}60%,100%{left:130%}}
  @keyframes pop{0%{transform:scale(.5);opacity:0}100%{transform:scale(1);opacity:1}}
  @keyframes drop{0%{transform:translateY(-12px);opacity:0}100%{transform:translateY(0);opacity:1}}
  .lose-wrap{text-align:center;padding:30px 6px}
  .lose-emoji{font-size:44px}
  .lose-title{font-size:24px;font-weight:700;color:#66707a;margin:8px 0}
  .after-btn{background:#fff;color:#f107a3;border:2px solid #f107a3;font-weight:700}
  /* みんなの声（表示） */
  #page-voices{position:fixed;inset:0;padding:0;max-width:none;background:#000}
  #vs_stage{position:absolute;inset:0;background:#000 center/cover no-repeat;background-position:center}
  @media(max-width:768px){ #vs_stage{background-position:72% center} }
  #vs_veil{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.55),rgba(0,0,0,.15) 40%,rgba(0,0,0,0) 58%);pointer-events:none}
  #vs_title{position:absolute;top:14px;left:0;right:0;text-align:center;color:#fff;font-family:"Hiragino Mincho ProN","Yu Mincho",serif;font-size:clamp(13px,3.2vw,20px);letter-spacing:.25em;opacity:.9;text-shadow:0 2px 10px rgba(0,0,0,.8);z-index:3}
  .vcmt{position:absolute;color:#fff;font-family:"Hiragino Mincho ProN","Yu Mincho",serif;z-index:2;line-height:1.5;opacity:0;transition:opacity 1.2s ease;text-shadow:0 2px 12px rgba(0,0,0,.95),0 0 6px rgba(0,0,0,.85)}
  .vcmt .nm{display:block;font-size:.72em;opacity:.85;margin-top:4px}
</style>
</head>
<body>
<div class="loading" id="loading">読み込み中…</div>

<!-- ===== カレンダー登録 ===== -->
<div class="wrap page" id="page-calendar">
  <h1>カレンダー登録</h1>
  <label>タイトル<span class="req">必須</span></label>
  <input type="text" id="cal_title">
  <label>場所</label>
  <input type="text" id="cal_place">
  <label>詳細</label>
  <textarea id="cal_detail"></textarea>
  <label>開始日時<span class="req">必須</span></label>
  <div id="cal_start_wrap"></div>
  <label>終了日時<span class="req">必須</span></label>
  <div id="cal_end_wrap"></div>
  <label>タグ</label>
  <select id="cal_tag" style="width:100%"></select>
  <label>参加メンバー（複数選択可）</label>
  <div class="chips" id="cal_members"></div>
  <button id="cal_send">登録する</button>
  <div class="msg" id="cal_msg"></div>
</div>

<!-- ===== 予定の確認・変更・削除（カレンダー表示） ===== -->
<div class="wrap page" id="page-manage">
  <h1>予定カレンダー</h1>
  <div class="cal-head">
    <button id="prevM">‹</button>
    <div class="mlabel" id="mlabel"></div>
    <button id="nextM">›</button>
  </div>
  <div class="cal-grid" id="calgrid"></div>
  <div id="mng_detail"></div>
</div>

<!-- ===== 経費精算 ===== -->
<div class="wrap page" id="page-expense">
  <h1>経費精算</h1>
  <label>金額<span class="req">必須</span></label>
  <input type="number" id="exp_amount" inputmode="numeric" placeholder="例: 3000">
  <label>支払日</label>
  <input type="date" id="exp_payDate">
  <label>支払先</label>
  <input type="text" id="exp_payee">
  <label>内容</label>
  <input type="text" id="exp_content">
  <label>支払いメンバー（1人）</label>
  <div class="chips" id="exp_members"></div>
  <label>領収書の画像</label>
  <input type="file" id="exp_file" accept="image/*">
  <img id="exp_preview">
  <button id="exp_send">申請する</button>
  <div class="msg" id="exp_msg"></div>
</div>

<!-- ===== 機能要望 ===== -->
<div class="wrap page" id="page-request">
  <h1>機能要望</h1>
  <p class="lead">「こんな機能がほしい」「ここを改善してほしい」など、自由にお書きください。</p>
  <textarea id="req_text" placeholder="ご要望をどうぞ"></textarea>
  <button id="req_send">送信する</button>
  <div class="msg" id="req_msg"></div>
</div>

<!-- ===== ライブのリマインド設定 ===== -->
<div class="wrap page" id="page-remind">
  <h1>ライブのリマインド設定</h1>
  <p class="lead" id="rmd_lead"></p>
  <label>いつ思い出したいですか?（複数選べます）</label>
  <div class="chips" id="rmd_presets"></div>
  <label>日付で指定する（任意）</label>
  <input type="date" id="rmd_custom">
  <button id="rmd_send">リマインドを設定する</button>
  <div class="msg" id="rmd_msg"></div>
  <div id="rmd_list"></div>
</div>

<!-- ===== ライブ当日くじ（DEMO） ===== -->
<div class="wrap page" id="page-lottery">
  <div id="lot_form">
    <h1>ライブ当日くじ</h1>
    <p class="lead" id="lot_lead">事前に入力しておけます。くじは当日16時から引けます。</p>
    <label>お名前（ニックネーム可）<span class="req">必須</span></label>
    <input type="text" id="lot_name">
    <label>整理番号<span class="req">必須</span></label>
    <input type="text" id="lot_ticket" inputmode="numeric">
    <label>整理番号が見える写真<span class="req">必須</span></label>
    <input type="file" id="lot_file" accept="image/*">
    <img id="lot_preview" style="margin-top:8px;max-width:100%;border-radius:8px;display:none">
    <label>お住まいの都道府県<span class="req">必須</span></label>
    <select id="lot_pref" style="width:100%"></select>
    <div id="lot_city_wrap" style="display:none">
      <label>市区町村（宮城県）<span class="req">必須</span></label>
      <select id="lot_city" style="width:100%"></select>
    </div>
    <button id="lot_send">くじを引く</button>
    <div class="msg" id="lot_msg"></div>
  </div>
  <div id="lot_result" style="display:none"></div>
</div>
<div class="lot-overlay" id="lot_overlay">
  <div class="spinner"></div>
  <div class="txt">抽選中…</div>
</div>
<canvas id="confetti"></canvas>

<!-- ===== ライブの感想 ===== -->
<div class="wrap page" id="page-voice">
  <h1>ライブの感想</h1>
  <p class="lead">いただいた感想は、確認のうえ宣伝ページに掲載させていただくことがあります。</p>
  <label>お名前（ニックネーム可）<span class="req">必須</span></label>
  <input type="text" id="vo_name" maxlength="20">
  <label>感想<span class="req">必須・60文字まで</span></label>
  <textarea id="vo_text" maxlength="60" placeholder="今日の感想をどうぞ"></textarea>
  <button id="vo_send">送信する</button>
  <div class="msg" id="vo_msg"></div>
</div>

<!-- ===== みんなの声（表示） ===== -->
<div class="page" id="page-voices">
  <div id="vs_stage"></div>
  <div id="vs_veil"></div>
  <div id="vs_title">エンターテイナー Reprise ― みんなの声</div>
</div>

<!-- ===== 準備中 ===== -->
<div class="wrap page" id="page-notready">
  <h1>準備中</h1>
  <p>この機能はまだ準備中です。</p>
</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
  /* ===== 設定 ===== */
  var LIFF_ID = "2010573789-iYqvGWEV";
  var GAS_URL = "https://script.google.com/macros/s/AKfycbx7UPKBWDI_Vwgt7LValPYsYNHL7v9ER67kAmYWq3-y7YqqJ9wtfeq9WvMTEsVIQksx/exec";
  /* =============== */

  var MEMBERS = ["長利","hd","新井","Shin"];
  var TAGS = ["ライブ","打ち合わせ","挨拶","メディア","仕事","その他"];
  var WD = ["日","月","火","水","木","金","土"];
  var profile = { userId:"", displayName:"" };
  var GID = "";
  var expImage = null;
  var allEvents = [];
  var eventsByDate = {};
  var selDate = "";
  var viewY, viewM; // 表示中の年・月(0-11)

  function showPage(id){
    document.getElementById('loading').style.display = 'none';
    var el = document.getElementById('page-'+id); if(el) el.style.display='block';
  }
  function fail(t){ document.getElementById('loading').textContent = t; }
  function getParam(name){
    var u=new URL(location.href); var v=u.searchParams.get(name); if(v) return v;
    var st=u.searchParams.get('liff.state');
    if(st){ var q=(decodeURIComponent(st).split('?')[1]||''); return new URLSearchParams(q).get(name)||''; }
    return '';
  }
  function getPage(){
    var u=new URL(location.href); var st=u.searchParams.get('liff.state');
    if(st){ var path=decodeURIComponent(st).split('?')[0].replace(/^\/+/, ''); if(path) return path.toLowerCase(); }
    return (u.searchParams.get('page')||'calendar').toLowerCase();
  }
  function esc(s){ return (s||'').replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];}); }
  function attr(s){ return (s||'').replace(/"/g,'&quot;'); }
  function val(id){ var e=document.getElementById(id); return e?e.value:''; }
  function setMsg(id,t){ var e=document.getElementById(id); if(e) e.textContent=t; }
  function pad(n){ return ('0'+n).slice(-2); }

  // 15分単位の日時セレクト
  function dtSelectHtml(prefix, value){
    var d = value ? value.slice(0,10) : '';
    var hh = value ? value.slice(11,13) : '';
    var mnum = value ? parseInt(value.slice(14,16),10) : 0;
    var msel = ['00','15','30','45'][Math.min(3, Math.round(mnum/15))];
    var hopts=''; for(var i=0;i<24;i++){ var v=pad(i); hopts+='<option value="'+v+'"'+(v===hh?' selected':'')+'>'+v+'</option>'; }
    var mopts=''; ['00','15','30','45'].forEach(function(v){ mopts+='<option value="'+v+'"'+(v===msel?' selected':'')+'>'+v+'</option>'; });
    return '<div class="dt"><input type="date" id="'+prefix+'_d" value="'+d+'">'
      +'<select id="'+prefix+'_h">'+hopts+'</select><span>:</span>'
      +'<select id="'+prefix+'_m">'+mopts+'</select></div>';
  }
  function dtVal(prefix){
    var d=val(prefix+'_d'); if(!d) return '';
    return d+'T'+val(prefix+'_h')+':'+val(prefix+'_m');
  }

  // 部品の用意
  var tagSel = document.getElementById('cal_tag');
  tagSel.innerHTML = '<option value="">（未設定）</option>' + TAGS.map(function(t){return '<option>'+t+'</option>';}).join('');
  document.getElementById('cal_members').innerHTML =
    MEMBERS.map(function(m){ return '<label><input type="checkbox" value="'+m+'">'+m+'</label>'; }).join('');
  document.getElementById('exp_members').innerHTML =
    MEMBERS.map(function(m){ return '<label><input type="radio" name="exp_member" value="'+m+'">'+m+'</label>'; }).join('');
  // 登録フォームの日時セレクト（初期は今日の日付）
  var today = new Date(); var todayStr = today.getFullYear()+'-'+pad(today.getMonth()+1)+'-'+pad(today.getDate());
  document.getElementById('cal_start_wrap').innerHTML = dtSelectHtml('cal_start', todayStr+'T19:00');
  document.getElementById('cal_end_wrap').innerHTML   = dtSelectHtml('cal_end',   todayStr+'T20:00');

  liff.init({ liffId: LIFF_ID }).then(function(){
    if (!liff.isLoggedIn()) { liff.login(); return; }
    return liff.permission.query('profile').then(function(s){
      if (s.state === 'prompt') return liff.permission.requestAll();
    }).then(function(){ return liff.getProfile(); });
  }).then(function(p){
    if (p) profile = p;
    GID = getParam('gid');
    var page = getPage();
    if (page === 'calendar')      showPage('calendar');
    else if (page === 'manage')   { showPage('manage'); viewY=today.getFullYear(); viewM=today.getMonth(); loadEvents(); }
    else if (page === 'expense')  showPage('expense');
    else if (page === 'request')  showPage('request');
    else if (page === 'remind')   { showPage('remind'); initRemind(); }
    else if (page === 'lottery')  { showPage('lottery'); initLottery(); }
    else if (page === 'voice')    showPage('voice');
    else if (page === 'voices')   { showPage('voices'); initVoices(); }
    else                          showPage('notready');
  }).catch(function(e){ fail('読み込みに失敗しました。もう一度開いてください。'); });

  // 画像縮小
  document.getElementById('exp_file').onchange = function(e){
    var f=e.target.files[0]; if(!f) return;
    var reader=new FileReader();
    reader.onload=function(ev){
      var img=new Image();
      img.onload=function(){
        var max=1600,w=img.width,h=img.height;
        if(w>max||h>max){ if(w>=h){h=Math.round(h*max/w);w=max;}else{w=Math.round(w*max/h);h=max;} }
        var c=document.createElement('canvas'); c.width=w; c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        expImage=c.toDataURL('image/jpeg',0.8);
        var pv=document.getElementById('exp_preview'); pv.src=expImage; pv.style.display='block';
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(f);
  };

  function post(payload, btn, msgId, okText){
    if(btn) btn.disabled=true; if(msgId) setMsg(msgId,'送信中…');
    return fetch(GAS_URL,{method:'POST',body:JSON.stringify(payload)})
      .then(function(r){return r.json();})
      .then(function(res){
        if(res&&res.ok){ if(msgId) setMsg(msgId,okText); return res; }
        if(msgId) setMsg(msgId,'失敗: '+((res&&res.error)||'不明')); if(btn) btn.disabled=false; return res;
      })
      .catch(function(err){ if(msgId) setMsg(msgId,'通信エラー: '+err.message); if(btn) btn.disabled=false; throw err; });
  }
  function closeIt(){ if(liff.isInClient()) liff.closeWindow(); }
  function postClose(payload,btn,msgId,okText){ post(payload,btn,msgId,okText).then(function(res){ if(res&&res.ok) setTimeout(closeIt,1200); }); }

  // ===== D カレンダー表示 =====
  function loadEvents(){
    fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:'getCalendarEvents',gid:GID})})
      .then(function(r){return r.json();})
      .then(function(res){ allEvents=(res&&res.events)||[]; indexEvents(); renderMonth(); })
      .catch(function(){ document.getElementById('calgrid').innerHTML='<div class="empty">読み込みに失敗しました。</div>'; });
  }
  function indexEvents(){
    eventsByDate={};
    allEvents.forEach(function(ev,i){ ev._idx=i; var k=ev.start.slice(0,10); (eventsByDate[k]=eventsByDate[k]||[]).push(ev); });
  }
  function renderMonth(){
    document.getElementById('mlabel').textContent = viewY+'年'+(viewM+1)+'月';
    var first=new Date(viewY,viewM,1).getDay();
    var days=new Date(viewY,viewM+1,0).getDate();
    var todayKey=today.getFullYear()+'-'+pad(today.getMonth()+1)+'-'+pad(today.getDate());
    var html = WD.map(function(w){return '<div class="wd">'+w+'</div>';}).join('');
    for(var b=0;b<first;b++) html+='<div class="cell blank"></div>';
    for(var d=1;d<=days;d++){
      var key=viewY+'-'+pad(viewM+1)+'-'+pad(d);
      var evs=eventsByDate[key]||[];
      var cls='cell'+(key===todayKey?' today':'')+(key===selDate?' sel':'');
      html+='<div class="'+cls+'" onclick="selectDay(\''+key+'\')">'+d
        +(evs.length?'<span class="dot"></span><span class="cnt">'+evs.length+'</span>':'')+'</div>';
    }
    document.getElementById('calgrid').innerHTML=html;
    if(selDate) renderDetail();
  }
  function selectDay(key){ selDate=key; renderMonth(); renderDetail(); document.getElementById('mng_detail').scrollIntoView({behavior:'smooth',block:'nearest'}); }
  function renderDetail(){
    var list=eventsByDate[selDate]||[];
    var head='<h2>'+selDate+'</h2>';
    if(list.length===0){ document.getElementById('mng_detail').innerHTML=head+'<div class="empty">この日の予定はありません。</div>'; return; }
    document.getElementById('mng_detail').innerHTML = head + list.map(function(ev){
      var i=ev._idx;
      var mem=(ev.members||'').split('・');
      var memChips=MEMBERS.map(function(m){ return '<label><input type="checkbox" value="'+m+'"'+(mem.indexOf(m)>=0?' checked':'')+'>'+m+'</label>'; }).join('');
      var tagOpts='<option value="">（未設定）</option>'+TAGS.map(function(t){return '<option'+(t===ev.tag?' selected':'')+'>'+t+'</option>';}).join('');
      return '<div class="card">'
        + '<div class="t">'+esc(ev.title)+'</div>'
        + '<div class="meta">'+t2(ev.start)+' 〜 '+t2(ev.end)+(ev.place?('<br>場所: '+esc(ev.place)):'')
        + '<br>タグ: '+esc(ev.tag||'-')+' / 参加: '+esc(ev.members||'-')+'</div>'
        + '<div class="rowbtns"><button onclick="mngToggle('+i+')">変更</button>'
        + '<button class="del" onclick="mngDelete('+i+')">削除</button></div>'
        + '<div class="edit" id="edit'+i+'">'
        + '<label>タイトル</label><input id="et'+i+'" value="'+attr(ev.title)+'">'
        + '<label>場所</label><input id="ep'+i+'" value="'+attr(ev.place||'')+'">'
        + '<label>開始</label>'+dtSelectHtml('es'+i, ev.start)
        + '<label>終了</label>'+dtSelectHtml('ee'+i, ev.end)
        + '<label>タグ</label><select id="eg'+i+'" style="width:100%">'+tagOpts+'</select>'
        + '<label>参加メンバー</label><div class="chips" id="em'+i+'">'+memChips+'</div>'
        + '<button class="save" onclick="mngSave('+i+')">保存する</button>'
        + '<div class="msg" id="emsg'+i+'"></div></div>'
        + '</div>';
    }).join('');
  }
  function t2(s){ return (s||'').replace('T',' '); }
  function mngToggle(i){ var e=document.getElementById('edit'+i); e.style.display=(e.style.display==='block'?'none':'block'); }
  function mngSave(i){
    var ev=allEvents[i];
    var title=val('et'+i), start=dtVal('es'+i), end=dtVal('ee'+i), place=val('ep'+i), tag=val('eg'+i);
    var members=[].slice.call(document.querySelectorAll('#em'+i+' input:checked')).map(function(c){return c.value;});
    if(!title||!start||!end){ setMsg('emsg'+i,'タイトル・開始・終了は必須です。'); return; }
    if(end<start){ setMsg('emsg'+i,'終了は開始より後にしてください。'); return; }
    post({action:'updateCalendarEvent',row:ev.row,calEventId:ev.calEventId,gid:GID,userName:profile.displayName,
      title:title,start:start,end:end,place:place,detail:ev.detail,tag:tag,members:members},
      null,'emsg'+i,'更新しました。').then(function(res){ if(res&&res.ok) setTimeout(loadEvents,700); });
  }
  function mngDelete(i){
    var ev=allEvents[i];
    if(!confirm('この予定を削除しますか?\n「'+ev.title+'」')) return;
    post({action:'deleteCalendarEvent',row:ev.row,calEventId:ev.calEventId,gid:GID,userName:profile.displayName,title:ev.title},
      null,null,'').then(function(res){ if(res&&res.ok) loadEvents(); });
  }
  document.getElementById('prevM').onclick=function(){ viewM--; if(viewM<0){viewM=11;viewY--;} renderMonth(); };
  document.getElementById('nextM').onclick=function(){ viewM++; if(viewM>11){viewM=0;viewY++;} renderMonth(); };

    if(!title||!start||!end){ setMsg('cal_msg','タイトル・開始・終了は必須です。'); return; }
    if(end<start){ setMsg('cal_msg','終了は開始より後にしてください。'); return; }
    var members=[].slice.call(document.querySelectorAll('#cal_members input:checked')).map(function(c){return c.value;});
    postClose({action:'submitCalendar',title:title,place:val('cal_place').trim(),detail:val('cal_detail').trim(),
      start:start,end:end,tag:tagSel.value,members:members,gid:GID,userName:profile.displayName,userId:profile.userId},
      this,'cal_msg','登録しました。画面を閉じます。');
  };
  document.getElementById('exp_send').onclick=function(){
    var amount=val('exp_amount'); if(!amount){ setMsg('exp_msg','金額は必須です。'); return; }
    var picked=document.querySelector('#exp_members input:checked');
    postClose({action:'submitExpense',amount:amount,payDate:val('exp_payDate'),payee:val('exp_payee').trim(),
      content:val('exp_content').trim(),members:picked?[picked.value]:[],gid:GID,userName:profile.displayName,
      userId:profile.userId,imageBase64:expImage,imageName:'receipt.jpg',imageMime:'image/jpeg'},
      this,'exp_msg','申請しました。画面を閉じます。');
  };
  document.getElementById('req_send').onclick=function(){
    var text=val('req_text').trim(); if(!text){ setMsg('req_msg','内容を入力してください。'); return; }
    postClose({action:'submitRequest',text:text,gid:GID,userName:profile.displayName,userId:profile.userId},
      this,'req_msg','送信しました。ありがとうございます。');
  };

  // 感想投稿
  document.getElementById('vo_send').onclick=function(){
    var name=val('vo_name').trim(), text=val('vo_text').trim();
    if(!name||!text){ setMsg('vo_msg','お名前と感想を入力してください。'); return; }
    postClose({action:'submitVoice',name:name,text:text,userId:profile.userId},
      this,'vo_msg','送信しました。ありがとうございます！');
  };

  var vUsed={}, vBoxes=[];
  function vRand(a,b){ return a+Math.random()*(b-a); }
  function vOverlap(a,b){ var m=12; return !(a.x+a.w+m<b.x||b.x+b.w+m<a.x||a.y+a.h+m<b.y||b.y+b.h+m<a.y); }
  function vPick(){ var t=0; while(t++<50){ var i=Math.floor(Math.random()*VOICES.length); if(!vUsed[i])return i; } return Math.floor(Math.random()*VOICES.length); }
  function vFindSpot(box){
    var vw=window.innerWidth, vh=window.innerHeight;
    var topMin=vh*0.06, topMax=vh*0.46, leftMin=vw*0.03, leftMax=vw*0.62;
    for(var a=0;a<40;a++){
      var x=vRand(leftMin,Math.max(leftMin,leftMax)), y=vRand(topMin,topMax);
      if(x+box.w>vw*0.97)x=vw*0.97-box.w; if(y+box.h>vh*0.52)y=vh*0.52-box.h;
      if(x<4)x=4; if(y<topMin)y=topMin;
      var cand={x:x,y:y,w:box.w,h:box.h}, hit=false;
      for(var k=0;k<vBoxes.length;k++){ if(vBoxes[k].w&&vOverlap(cand,vBoxes[k])){hit=true;break;} }
      if(!hit)return cand;
    }
    return null;
  }
  var VSIZES=["clamp(15px,3.2vw,22px)","clamp(16px,3.7vw,27px)","clamp(18px,4.3vw,32px)"];
  function vSlot(delay){
    var cont=document.getElementById('page-voices');
    var el=document.createElement('div'); el.className='vcmt';
    el.style.maxWidth=(window.innerWidth<=640?'72vw':'38vw');
    cont.appendChild(el);
    var rec={el:el,x:0,y:0,w:0,h:0}; vBoxes.push(rec);
    function cycle(){
      var idx=vPick(); vUsed[idx]=true; var c=VOICES[idx];
      el.innerHTML=c.t+'<span class="nm">— '+(c.n||'')+'</span>';
      el.style.fontSize=VSIZES[Math.floor(Math.random()*VSIZES.length)];
      el.style.left='-9999px'; el.style.top='0px'; el.style.opacity=0;
      requestAnimationFrame(function(){
        var w=el.offsetWidth,h=el.offsetHeight, spot=vFindSpot({w:w,h:h});
        if(!spot){ vUsed[idx]=false; setTimeout(cycle,700); return; }
        rec.x=spot.x; rec.y=spot.y; rec.w=w; rec.h=h;
        el.style.left=spot.x+'px'; el.style.top=spot.y+'px';
        requestAnimationFrame(function(){ el.style.opacity=1; });
        setTimeout(function(){ el.style.opacity=0; setTimeout(function(){ vUsed[idx]=false; rec.w=0; rec.h=0; cycle(); },1300); }, vRand(4400,7000));
      });
    }
    setTimeout(cycle, delay);
  }

  function minusDays(dateStr,n){
    var p=dateStr.split('-'); var d=new Date(Date.UTC(+p[0],+p[1]-1,+p[2]));

    return d.getUTCFullYear()+'-'+pad(d.getUTCMonth()+1)+'-'+pad(d.getUTCDate());

      .then(function(res){
        lotOpen = !!(res && res.open);
        var btn=document.getElementById('lot_send');
        var lead=document.getElementById('lot_lead');
        if(lotOpen){ btn.textContent='くじを引く'; lead.textContent='必要事項を入力して、くじを引いてください。'; }
        else { btn.textContent='事前登録する'; lead.textContent='いまは事前登録ができます。くじは当日16時から引けます。'; }
      })
      .catch(function(){});
  }

  document.getElementById('lot_file').onchange=function(e){
    var f=e.target.files[0]; if(!f) return;
    var reader=new FileReader();
    reader.onload=function(ev){
      var img=new Image();
      img.onload=function(){
        var max=1400,w=img.width,h=img.height;
        if(w>max||h>max){ if(w>=h){h=Math.round(h*max/w);w=max;}else{w=Math.round(w*max/h);h=max;} }
        var c=document.createElement('canvas'); c.width=w; c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        lotImage=c.toDataURL('image/jpeg',0.8);
        var pv=document.getElementById('lot_preview'); pv.src=lotImage; pv.style.display='block';
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(f);
  };

  document.getElementById('lot_send').onclick=function(){
    var name=val('lot_name').trim(), ticket=val('lot_ticket').trim(), pref=val('lot_pref'), city=val('lot_city');
    if(!name||!ticket){ setMsg('lot_msg','お名前と整理番号は必須です。'); return; }
    if(!lotImage){ setMsg('lot_msg','整理番号が見える写真を選んでください。'); return; }
    if(!pref){ setMsg('lot_msg','都道府県を選んでください。'); return; }
    if(pref==='宮城県' && !city){ setMsg('lot_msg','市区町村を選んでください。'); return; }
    var btn=this; btn.disabled=true; setMsg('lot_msg','確認中…');
    var base={ticket:ticket,name:name,pref:pref,city:city,userId:profile.userId};

    // 事前登録（開放前）
    if(!lotOpen){
      setMsg('lot_msg','送信中…');
      savePhoto(ticket).then(function(photoUrl){
        base.photoUrl=photoUrl;
        return fetch(GAS_URL,{method:'POST',body:JSON.stringify(Object.assign({action:'registerLottery'},base))}).then(function(r){return r.json();});
      }).then(function(rr){
        if(rr&&rr.ok){ setMsg('lot_msg','事前登録しました。くじは当日16時から引けます。'); }
        else { setMsg('lot_msg','登録に失敗しました: '+((rr&&rr.error)||'不明')); btn.disabled=false; }
      }).catch(function(err){ setMsg('lot_msg','通信エラー: '+err.message); btn.disabled=false; });
      return;
    }

    // 開放中：まず抽選済みか確認 → 済みなら結果表示（演出なし）／未抽選なら演出→抽選
    fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:'lotteryStatus',ticket:ticket})})
      .then(function(r){return r.json();})
      .then(function(st){
        if(st && st.drawn){ showAlready(st.drawn, ticket); return; }
        setMsg('lot_msg','送信中…');
        return savePhoto(ticket).then(function(photoUrl){
          base.photoUrl=photoUrl;
          document.getElementById('lot_overlay').classList.add('on');
          var started=Date.now();
          return fetch(GAS_URL,{method:'POST',body:JSON.stringify(Object.assign({action:'drawLottery'},base))})
            .then(function(r){return r.json();})
            .then(function(rr){
              var wait=Math.max(0, 2800-(Date.now()-started));
              setTimeout(function(){ document.getElementById('lot_overlay').classList.remove('on'); showResult(rr,ticket); }, wait);
            });
        });
      })
      .catch(function(err){
        document.getElementById('lot_overlay').classList.remove('on');
        setMsg('lot_msg','通信エラー: '+err.message); btn.disabled=false;
      });
  };

  function savePhoto(ticket){
    return fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:'saveLotteryPhoto',ticket:ticket,imageBase64:lotImage,imageMime:'image/jpeg'})})
      .then(function(r){return r.json();}).then(function(res){ return (res&&res.url)||''; });
  }

  // すでに抽選済みのときの画面（演出なし・前回結果を表示）
  function showAlready(drawn, ticket){
    document.getElementById('lot_form').style.display='none';
    var el=document.getElementById('lot_result'); el.style.display='block';
    var head = '<div style="text-align:center;background:#fff;border:1px solid #e1e6ea;border-radius:12px;padding:14px;margin-bottom:14px">'
      + '<div style="font-weight:700">この整理番号はすでに抽選済みです</div>'
      + (drawn.at?('<div style="font-size:12px;color:#889;margin-top:4px">抽選日時: '+esc(drawn.at)+'</div>'):'')
      + '</div>';
    el.innerHTML = head + resultHtml(drawn, ticket, true);
  }

  function showResult(res, ticket){
    if(!res || res.ok===false){ setMsg('lot_msg','エラー: '+((res&&res.error)||'不明')); document.getElementById('lot_send').disabled=false; return; }
    document.getElementById('lot_form').style.display='none';
    var el=document.getElementById('lot_result'); el.style.display='block';
    el.innerHTML = resultHtml(res, ticket, res.already);
    if(res.type!=='none' && !res.already) burstConfetti();  // 新規当選のときだけ紙吹雪
  }

  // 結果のHTMLを組み立て（当たり/はずれ共通）
  function resultHtml(res, ticket, quiet){
    if(res.type==='none'){
      return '<div class="lose-wrap"><div class="lose-emoji">🍀</div><div class="lose-title">はずれ</div><p>また次の機会に！</p></div>';
    }
    var extra='';
    if(res.type==='onsite'){
      extra = '<div class="prize-card" style="background:linear-gradient(135deg,#11998e,#38ef7d);box-shadow:0 12px 30px rgba(17,153,142,.35)">'
        + '<div class="shine"></div><div class="plabel">その場で引き換え</div><div class="pname">'+esc(res.resultName)+'</div>'
        + '<div style="margin-top:12px;font-size:13px;opacity:.9">整理番号</div><div style="font-size:26px;font-weight:800;letter-spacing:2px">'+esc(ticket)+'</div></div>'
        + '<p style="text-align:center;font-size:13px;color:#667;margin-top:12px">この画面をスタッフにお見せください</p>';
    } else {
      extra = '<div class="prize-card"><div class="shine"></div><div class="plabel">当選賞品</div><div class="pname">'+esc(res.resultName)+'</div></div>'
        + '<div style="text-align:center;margin-top:16px"><button class="after-btn" onclick="alert(\'（DEMO）応募フォームへ\')">応募フォームへ</button>'
        + '<p style="font-size:13px;color:#667;margin-top:8px">後日配送のため、応募フォームからお進みください</p></div>';
    }
    var title = quiet
      ? '<div class="win-wrap"><div class="win-title" style="font-size:30px">当選済み</div></div>'
      : '<div class="win-wrap"><div class="win-badge">★ CONGRATULATIONS ★</div><div class="win-title">当たり！</div></div>';
    return title + extra;
  }
  // 紙吹雪
  function burstConfetti(){
    var cv=document.getElementById('confetti'); cv.style.display='block';
    cv.width=window.innerWidth; cv.height=window.innerHeight;
    var ctx=cv.getContext('2d');
    var colors=['#ff3d77','#ff8a00','#ffd200','#38ef7d','#7b2ff7','#00c6ff'];
    var parts=[];
    for(var i=0;i<160;i++){
      parts.push({x:Math.random()*cv.width, y:-20-Math.random()*cv.height*0.5,
        w:6+Math.random()*6, h:8+Math.random()*8, c:colors[i%colors.length],
        vy:2+Math.random()*3, vx:-1.5+Math.random()*3, rot:Math.random()*6, vr:-0.2+Math.random()*0.4});
    }
    var t0=Date.now();
    (function frame(){
      ctx.clearRect(0,0,cv.width,cv.height);
      parts.forEach(function(p){
        p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr;
        ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot); ctx.fillStyle=p.c;
        ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h); ctx.restore();
      });
      if(Date.now()-t0<4500){ requestAnimationFrame(frame); }
      else { ctx.clearRect(0,0,cv.width,cv.height); cv.style.display='none'; }
    })();
  }

  document.getElementById('rmd_send').onclick=function(){
    var dates=[].slice.call(document.querySelectorAll('.rmd_p:checked')).map(function(c){return c.value;});
    var custom=val('rmd_custom'); if(custom) dates.push(custom);
    if(dates.length===0){ setMsg('rmd_msg','思い出したい日を1つ以上選んでください。'); return; }
    var btn=this; btn.disabled=true; setMsg('rmd_msg','設定中…');
    fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:'submitRemind',dates:dates,gid:GID,userName:profile.displayName,userId:profile.userId})})
      .then(function(r){return r.json();})
      .then(function(res){
        if(res&&res.ok){
          setMsg('rmd_msg', res.added+'件のリマインドを設定しました。');
          // 選択をリセットして一覧更新
          [].slice.call(document.querySelectorAll('.rmd_p:checked')).forEach(function(c){c.checked=false;});
          document.getElementById('rmd_custom').value='';
          btn.disabled=false; loadRemindList();
        } else { setMsg('rmd_msg','失敗: '+((res&&res.error)||'不明')); btn.disabled=false; }
      })
      .catch(function(err){ setMsg('rmd_msg','通信エラー: '+err.message); btn.disabled=false; });
  };
</script>
